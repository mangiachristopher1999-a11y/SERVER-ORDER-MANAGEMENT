<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="manifest.json">
  <title>Cameriere Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">Server Order Management</div>
  <div id="shiftPill" class="shift-pill off">Turno off</div>
</div>

<!-- SCROLL WRAPPER -->
<div class="scroll">
  <div class="pad">
    <div id="sec-menu"   class="sec active"></div>
    <div id="sec-turno"  class="sec"></div>
    <div id="sec-orders" class="sec"></div>
    <div id="sec-stamp"  class="sec"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nb active" id="nb-menu"   onclick="goTo('menu')"  ><span class="ico">📋</span>Menu</button>
  <button class="nb"         id="nb-turno"  onclick="goTo('turno')" ><span class="ico">⏱</span>Turno</button>
  <button class="nb"         id="nb-orders" onclick="goTo('orders')"><span class="ico">📂</span>Comande</button>
  <button class="nb"         id="nb-stamp"  onclick="goTo('stamp')" ><span class="ico">✏️</span>Nuova</button>
</nav>

<!-- TOAST -->
<div id="toast"></div>

<!-- MODAL: Aggiungi voce menu -->
<div id="addModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="addModalTitle">
  <div class="modal-box">
    <div class="modal-title" id="addModalTitle">Aggiungi voce</div>
    <div class="field">
      <label>Nome pietanza / bevanda</label>
      <input id="mi-name" type="text" placeholder="es. Tagliatelle al ragù">
    </div>
    <div class="row">
      <div class="field">
        <label>Prezzo €</label>
        <input id="mi-price" type="text" inputmode="decimal" placeholder="0.00">
      </div>
      <div class="field">
        <label>Porzioni (opz.)</label>
        <input id="mi-portions" type="number" min="0" placeholder="—">
      </div>
    </div>
    <div class="g12"></div>
    <button class="btn btn-black btn-full" onclick="saveMenuItem()">+ Aggiungi</button>
    <div class="g8"></div>
    <button class="btn btn-muted btn-full" onclick="closeModal()">Annulla</button>
  </div>
</div>

<!-- MODAL: Conferma azione -->
<div id="confirmModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title" id="confirmTitle">Conferma</div>
    <div id="confirmMessage" style="margin-bottom:24px;font-size:13px;font-weight:500;line-height:1.5;white-space:pre-wrap;"></div>
    <div class="row">
      <button class="btn btn-muted" id="btnConfirmCancel" style="flex:1;">Annulla</button>
      <button class="btn btn-black" id="btnConfirmOk"     style="flex:1;">OK</button>
    </div>
  </div>
</div>

<!-- INPUT NASCOSTO per importazione menu JSON -->
<input type="file" id="importMenuInput" style="display:none" accept=".json,.txt" onchange="handleImportMenu(event)">
<script src="app.js"></script>
</body>
</html>
